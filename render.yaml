services:
  - type: web
    name: institutional-tracker-web
    env: python
    region: frankfurt
    plan: free
    buildCommand: "pip install -r requirements.txt && pip install gunicorn"
    # 使用 240 秒超時，以容納 TWSE 繁忙時的多次重試時間，預防 504 Gateway Timeout
    startCommand: "gunicorn app:app --timeout 240 --workers 1 --threads 2 -b 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
